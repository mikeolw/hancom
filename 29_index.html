<!DOCTYPE html> <!--ㅗHTML 선언-->
<html lang="ko"> <!--HTML 시작 및 한글 설정-->
<head> <!--화면에 보이지 않는 영역-->
    <meta charset="UTF-8"> <!--한글 안 깨지게-->
    <title>영상 넣기</title> <!--브라우저 탭 이름-->
</head>
<body> <!--화면에 보이는 영역-->
    <h1>영상 넣기</h1>
    <hr>
    <video 
    width="640" 
    height="360" 
    src="../02_html/video.mp4" 
    autoplay
    loop

    controls>

    </video>
</body>
</html>
<!-- 
- src="movie.mp4" : 재생할 비디오 파일 지정

- width="640" height="360" : 비디오 크기 설정

- controls : 재생/일시정지, 볼륨, 탐색 등의 기본 UI 표시

- autoplay : 페이지 로드 시 자동 재생

- loop : 끝나면 다시 처음부터 반복

- muted : 기본 음소거 상태

- poster="thumbnail.jpg" : 재생 전 표시할 이미지

- preload="metadata" : <video> 태그에서 브라우저가 동영상을 얼마나 미리 로드할지를 지정하는 옵션
    - 장점 : 네트워크 사용량을 최소화하면서 동영상의 기본 정보(길이, 썸네일 등)를 미리 로드할 수 있음
    - 단점 : 동영상의 전체 내용을 미리 로드하지 않기 때문에, 사용자가 동영상을 재생할 때 버퍼링이 발생할 수 있음 (재생 버튼 누른 후에 다운로드 시작)
    - none : 동영상의 메타데이터를 미리 로드하지 않음, 네트워크 절약이 최우선일 때
    - auto : 동영상의 메타데이터와 전체 내용을 미리 로드함, 빠른 재생 시작이 중요할 때(데이터 사용량은 많음)
    - metadata : 동영상의 메타데이터만 미리 로드함, 영상 정보를 미리 표시하고 싶지만 데이터 사용은 최소화하고 싶을 때
-->
